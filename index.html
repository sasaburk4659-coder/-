<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Текст от бота</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 24px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            margin: 0 0 16px 0;
            color: #1f2a3e;
        }
        .text-display {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 20px;
            min-height: 120px;
            font-size: 1.2rem;
            line-height: 1.4;
            word-break: break-word;
            white-space: pre-wrap;
            color: #0a2540;
            border: 1px solid #e6edf4;
        }
        .status {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #5c6f87;
        }
        .refresh-btn {
            margin-top: 16px;
            background: #0088cc;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .refresh-btn:hover {
            background: #006699;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📩 Последнее сообщение от бота</h1>
    <div class="text-display" id="messageText">
        Загрузка...
    </div>
    <button class="refresh-btn" onclick="fetchText()">⟳ Обновить</button>
    <div class="status" id="status"></div>
</div>

<script>
    // 🔁 ЗАМЕНИТЕ ЭТУ ССЫЛКУ НА ВАШ РЕАЛЬНЫЙ API (Flask-сервер)
    const API_URL = 'https://ваш-адрес.ngrok.io/get_text';   // <-- поменять!

    async function fetchText() {
        const textDiv = document.getElementById('messageText');
        const statusSpan = document.getElementById('status');
        textDiv.innerText = 'Загрузка...';
        statusSpan.innerText = '';

        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            textDiv.innerText = data.text || '(пусто)';
            statusSpan.innerText = '✅ Обновлено: ' + new Date().toLocaleTimeString();
        } catch (err) {
            console.error(err);
            textDiv.innerText = '⚠️ Не удалось загрузить текст';
            statusSpan.innerText = 'Ошибка соединения с сервером';
        }
    }

    // При загрузке страницы сразу получаем текст
    fetchText();

    // Автообновление каждые 5 секунд (можно убрать или изменить интервал)
    setInterval(fetchText, 5000);
</script>
</body>
</html>
