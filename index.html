<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>📱 3D CLIENT | Space Nexus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', 'Segoe UI', monospace;
            touch-action: pan-x pan-y;
        }
        
        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .game-ui {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7));
            backdrop-filter: blur(15px);
            padding: 15px 12px 20px;
            border-top: 2px solid #0ff;
            z-index: 200;
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: rgba(0, 20, 40, 0.9);
            border-radius: 30px;
            padding: 6px 12px;
            text-align: center;
            flex: 1;
            min-width: 70px;
            border-left: 2px solid #0ff;
        }
        
        .stat-label {
            font-size: 0.55rem;
            color: #8aaaff;
            text-transform: uppercase;
        }
        
        .stat-value {
            font-size: 1rem;
            font-weight: bold;
            color: #0ff;
        }
        
        .controls-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            background: rgba(0, 30, 50, 0.9);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 18px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.1s ease;
            backdrop-filter: blur(5px);
            touch-action: manipulation;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        
        .btn:active {
            transform: scale(0.96);
            background: #0ff;
            color: #000;
            box-shadow: 0 0 15px cyan;
        }
        
        .btn-danger {
            border-color: #ff6688;
            color: #ff6688;
        }
        
        .connection-status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.85);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            z-index: 200;
            font-family: monospace;
            border: 1px solid #ffaa44;
            color: #ffaa44;
            backdrop-filter: blur(5px);
        }
        
        .tap-indicator {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,255,255,0.5);
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: tapRipple 0.4s ease-out forwards;
            z-index: 300;
        }
        
        @keyframes tapRipple {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid #ff3366;
            z-index: 300;
            min-width: 250px;
            backdrop-filter: blur(10px);
        }
        
        .game-over h2 {
            color: #ff3366;
            margin-bottom: 15px;
        }
        
        .server-url {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 0.55rem;
            color: #6aa;
            z-index: 200;
            font-family: monospace;
        }
        
        @media (max-width: 600px) {
            .btn { padding: 8px 12px; font-size: 0.7rem; min-width: 70px; }
            .stat { padding: 4px 8px; }
            .stat-value { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="connection-status" id="connStatus">
        🔌 ПОДКЛЮЧЕНИЕ К СЕРВЕРУ...
    </div>
    
    <div class="server-url" id="serverUrl">
        🖥️ СЕРВЕР: https://sasaburk4659-coder.github.io/Sexiser/
    </div>
    
    <div class="game-ui" id="gameUI">
        <div class="stats-bar">
            <div class="stat"><div class="stat-label">💠 ЯДРО</div><div class="stat-value" id="coreEnergy">--%</div></div>
            <div class="stat"><div class="stat-label">⚙️ НАНОБОТЫ</div><div class="stat-value" id="nanoBots">--</div></div>
            <div class="stat"><div class="stat-label">🏆 СЧЁТ</div><div class="stat-value" id="score">0</div></div>
            <div class="stat"><div class="stat-label">🌊 ВОЛНА</div><div class="stat-value" id="wave">1</div></div>
        </div>
        
        <div class="controls-row">
            <button class="btn" id="btnUpgrade">⚡ АПГРЕЙД</button>
            <button class="btn" id="btnShield">🛡️ ЩИТ (55)</button>
            <button class="btn" id="btnRepair">🔧 ВОССТАНОВИТЬ</button>
            <button class="btn btn-danger" id="btnReset">🔄 РЕСТАРТ</button>
        </div>
        
        <div style="text-align: center; font-size: 0.6rem; color: #6aa; margin-top: 8px;">
            👆 КАСНИТЕСЬ ПО ВРАГУ - АТАКА НАНОБОТАМИ
        </div>
    </div>
    
    <div id="gameOverlay" style="display: none;" class="game-over">
        <h2>💀 GAME OVER 💀</h2>
        <p style="color:#fff; margin: 10px 0;">Сервер уничтожен</p>
        <button class="btn" id="restartBtn" style="margin-top: 10px;">🔄 НОВАЯ ИГРА</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // ==================== КЛИЕНТ - ПОДКЛЮЧЕНИЕ К СЕРВЕРУ ====================
        // Адрес сервера (родительский iframe или прямое подключение)
        const SERVER_URL = "https://sasaburk4659-coder.github.io/Sexiser/";
        
        let clientId = null;
        let currentState = null;
        let connected = false;
        let pendingActions = [];
        
        // API для связи с сервером (через postMessage для кросс-доменного взаимодействия)
        let serverWindow = null;
        
        function initConnection() {
            // Пытаемся найти родительское окно (если клиент в iframe на сервере)
            if (window.parent && window.parent !== window) {
                serverWindow = window.parent;
                setupPostMessage();
                sendToServer({ type: 'REGISTER_CLIENT' });
            } else {
                // Если не в iframe, пытаемся открыть сервер в новом окне или используем localStorage
                document.getElementById('connStatus').innerHTML = '⚠️ ОЖИДАНИЕ СЕРВЕРА...';
                document.getElementById('connStatus').style.borderColor = '#ffaa44';
                
                // Пытаемся подключиться через localStorage (для демо-режима)
                setupLocalStorageConnection();
            }
        }
        
        function setupPostMessage() {
            window.addEventListener('message', (event) => {
                // Проверяем происхождение сообщения
                if (event.origin !== "https://sasaburk4659-coder.github.io") return;
                
                const data = event.data;
                if (data.type === 'CLIENT_REGISTERED') {
                    clientId = data.clientId;
                    connected = true;
                    document.getElementById('connStatus').innerHTML = '🟢 ПОДКЛЮЧЕН К СЕРВЕРУ';
                    document.getElementById('connStatus').style.borderColor = '#0f0';
                    document.getElementById('connStatus').style.color = '#0f0';
                    
                    // Отправляем ожидающие действия
                    pendingActions.forEach(action => sendToServer(action));
                    pendingActions = [];
                }
                else if (data.type === 'GAME_STATE_UPDATE') {
                    currentState = data.state;
                    updateUI();
                    update3DEnemies(currentState.enemies || []);
                    if (currentState.gameOver) showGameOver();
                }
                else if (data.type === 'ACTION_RESULT') {
                    console.log('Action result:', data.result);
                }
            });
        }
        
        function sendToServer(message) {
            if (serverWindow && connected) {
                serverWindow.postMessage({ ...message, clientId }, "https://sasaburk4659-coder.github.io");
            } else if (serverWindow) {
                pendingActions.push(message);
            }
        }
        
        // Демо-режим через localStorage (для тестирования без iframe)
        function setupLocalStorageConnection() {
            // Создаем скрытый iframe для связи с сервером
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = SERVER_URL;
            document.body.appendChild(iframe);
            
            serverWindow = iframe.contentWindow;
            
            // Ждем загрузки iframe
            iframe.onload = () => {
                setupPostMessage();
                sendToServer({ type: 'REGISTER_CLIENT' });
            };
        }
        
        // Вызовы API сервера
        function attackEnemy(enemyId) {
            if (!connected) {
                showToast("Нет подключения к серверу");
                return;
            }
            sendToServer({ type: 'ATTACK_ENEMY', enemyId });
        }
        
        function upgradeMemory() {
            if (!connected) return;
            sendToServer({ type: 'UPGRADE_MEMORY' });
        }
        
        function activateShield() {
            if (!connected) return;
            sendToServer({ type: 'ACTIVATE_SHIELD' });
        }
        
        function restoreNanobots() {
            if (!connected) return;
            sendToServer({ type: 'RESTORE_NANOBOTS' });
        }
        
        function resetGame() {
            if (!connected) return;
            sendToServer({ type: 'RESET_GAME' });
            document.getElementById('gameOverlay').style.display = 'none';
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.position = 'fixed';
            toast.style.bottom = '100px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.background = 'rgba(0,0,0,0.9)';
            toast.style.color = '#0ff';
            toast.style.padding = '8px 16px';
            toast.style.borderRadius = '30px';
            toast.style.border = '1px solid #0ff';
            toast.style.zIndex = '400';
            toast.style.fontSize = '0.7rem';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // ==================== 3D ВИЗУАЛИЗАЦИЯ ====================
        const canvas = document.getElementById('gameCanvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.012);
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 6, 12);
        
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        
        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x3366ff, 0.4);
        fillLight.position.set(-3, 2, 4);
        scene.add(fillLight);
        
        // Пол
        const gridHelper = new THREE.GridHelper(28, 20, 0x00ffcc, 0x3366aa);
        gridHelper.position.y = -0.8;
        scene.add(gridHelper);
        
        // Центральное ядро
        const coreGeo = new THREE.SphereGeometry(1.3, 64, 64);
        const coreMat = new THREE.MeshStandardMaterial({ color: 0x33aaff, emissive: 0x1166aa, emissiveIntensity: 0.7 });
        const coreMesh = new THREE.Mesh(coreGeo, coreMat);
        coreMesh.castShadow = true;
        scene.add(coreMesh);
        
        // Аура
        const auraGeo = new THREE.SphereGeometry(1.7, 32, 32);
        const auraMat = new THREE.MeshBasicMaterial({ color: 0x33aaff, transparent: true, opacity: 0.25 });
        const auraMesh = new THREE.Mesh(auraGeo, auraMat);
        scene.add(auraMesh);
        
        // Враги 3D
        let enemyMeshes = new Map();
        
        function update3DEnemies(enemies) {
            // Удаляем старых врагов
            enemyMeshes.forEach((mesh, id) => {
                if (!enemies.find(e => e.id == id)) {
                    scene.remove(mesh);
                    enemyMeshes.delete(id);
                }
            });
            
            // Добавляем/обновляем врагов
            enemies.forEach(enemy => {
                let mesh = enemyMeshes.get(enemy.id);
                if (!mesh) {
                    const geometry = new THREE.BoxGeometry(enemy.size || 0.7, enemy.size || 0.7, enemy.size || 0.7);
                    const material = new THREE.MeshStandardMaterial({ color: enemy.color || 0xff5577, emissive: 0x331100 });
                    mesh = new THREE.Mesh(geometry, material);
                    mesh.castShadow = true;
                    scene.add(mesh);
                    enemyMeshes.set(enemy.id, mesh);
                }
                mesh.position.set(enemy.x, enemy.y, enemy.z);
                
                // Цвет в зависимости от HP
                const hpPercent = enemy.hp / enemy.maxHp;
                if (hpPercent < 0.3) mesh.material.color.setHex(0xff6666);
                else if (hpPercent < 0.6) mesh.material.color.setHex(0xffaa66);
                else mesh.material.color.setHex(enemy.color || 0xff5577);
            });
        }
        
        // Анимация
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // Вращение камеры
            camera.position.x = 11 * Math.sin(time * 0.12);
            camera.position.z = 11 * Math.cos(time * 0.12);
            camera.lookAt(0, 0.5, 0);
            
            // Анимация ядра
            const energyPercent = currentState ? currentState.coreEnergy / 100 : 0.5;
            coreMesh.material.emissiveIntensity = 0.4 + energyPercent * 0.8;
            auraMesh.scale.setScalar(1 + Math.sin(time * 3) * 0.05);
            
            if (currentState && currentState.shieldsActive) {
                auraMat.opacity = 0.6;
                auraMat.color.setHex(0x88ffaa);
            } else {
                auraMat.opacity = 0.25;
                auraMat.color.setHex(0x33aaff);
            }
            
            renderer.render(scene, camera);
        }
        animate();
        
        // ==================== UI ОБНОВЛЕНИЕ ====================
        function updateUI() {
            if (!currentState) return;
            document.getElementById('coreEnergy').innerHTML = Math.floor(currentState.coreEnergy) + '%';
            document.getElementById('nanoBots').innerHTML = Math.floor(currentState.nanoBots);
            document.getElementById('score').innerHTML = currentState.score;
            document.getElementById('wave').innerHTML = currentState.wave || 1;
            
            // Изменение цвета при низкой энергии
            const energyEl = document.getElementById('coreEnergy');
            if (currentState.coreEnergy < 30) energyEl.style.color = '#ff6666';
            else if (currentState.coreEnergy < 60) energyEl.style.color = '#ffaa66';
            else energyEl.style.color = '#0ff';
        }
        
        function showGameOver() {
            document.getElementById('gameOverlay').style.display = 'block';
        }
        
        // ==================== ОБРАБОТЧИКИ КАСАНИЙ (мобильные) ====================
        function showTapEffect(x, y) {
            const indicator = document.createElement('div');
            indicator.className = 'tap-indicator';
            indicator.style.left = x + 'px';
            indicator.style.top = y + 'px';
            document.body.appendChild(indicator);
            setTimeout(() => indicator.remove(), 400);
        }
        
        // Получение координат касания для Raycaster
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        canvas.addEventListener('click', (e) => {
            if (!currentState || currentState.gameOver) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            showTapEffect(e.clientX, e.clientY);
            
            // Нормализованные координаты для Raycaster
            mouse.x = (x / rect.width) * 2 - 1;
            mouse.y = -(y / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(Array.from(enemyMeshes.values()));
            
            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                let hitEnemyId = null;
                for (let [id, mesh] of enemyMeshes) {
                    if (mesh === hitMesh) {
                        hitEnemyId = id;
                        break;
                    }
                }
                if (hitEnemyId) {
                    attackEnemy(hitEnemyId);
                    showToast("💥 АТАКА!");
                }
            } else {
                showToast("🎯 Промах! Цельтесь во врага");
            }
        });
        
        // Touch events для мобильных
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!currentState || currentState.gameOver) return;
            
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            showTapEffect(touch.clientX, touch.clientY);
            
            mouse.x = (x / rect.width) * 2 - 1;
            mouse.y = -(y / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(Array.from(enemyMeshes.values()));
            
            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                let hitEnemyId = null;
                for (let [id, mesh] of enemyMeshes) {
                    if (mesh === hitMesh) {
                        hitEnemyId = id;
                        break;
                    }
                }
                if (hitEnemyId) {
                    attackEnemy(hitEnemyId);
                    showToast("💥 АТАКА!");
                }
            }
        }, { passive: false });
        
        // Кнопки управления
        document.getElementById('btnUpgrade').addEventListener('click', () => upgradeMemory());
        document.getElementById('btnShield').addEventListener('click', () => activateShield());
        document.getElementById('btnRepair').addEventListener('click', () => restoreNanobots());
        document.getElementById('btnReset').addEventListener('click', () => resetGame());
        document.getElementById('restartBtn').addEventListener('click', () => resetGame());
        
        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Запуск подключения
        initConnection();
        
        // Демо-данные для отображения до подключения
        setTimeout(() => {
            if (!connected) {
                document.getElementById('connStatus').innerHTML = '⚠️ ОЖИДАНИЕ СЕРВЕРА...';
            }
        }, 3000);
    </script>
</body>
</html>
