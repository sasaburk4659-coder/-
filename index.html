<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Engine Server</title>
</head>
<body>
    <script>
        // ============ ИГРОВОЙ ДВИЖОК С REAL API ============
        
        let serverActive = true;
        let players = {};
        let messages = [];
        let nextPlayerId = 1;
        
        const ENGINE_KEY = "AI_ENGINE_7x9k2m4n8p1q_SECURE_2024";
        
        console.log('═══════════════════════════════════════════════════');
        console.log('🎮 GAME ENGINE SERVER v5.0');
        console.log(`🔑 KEY: ${ENGINE_KEY}`);
        console.log(`📡 STATUS: ${serverActive ? 'ONLINE' : 'OFFLINE'}`);
        console.log('═══════════════════════════════════════════════════');
        
        // ============ ГЛОБАЛЬНЫЙ API ============
        window.GameEngineAPI = {
            // Проверка статуса
            ping() {
                return JSON.stringify({
                    status: serverActive ? 'online' : 'offline',
                    timestamp: Date.now()
                });
            },
            
            // Получить статус
            getStatus() {
                return JSON.stringify({
                    active: serverActive,
                    players: Object.keys(players).length,
                    messages: messages.length
                });
            },
            
            // Подключить игрока
            connect(playerName) {
                if (!serverActive) {
                    return JSON.stringify({ error: 'SERVER_STOPPED' });
                }
                
                const playerId = 'p' + nextPlayerId++;
                players[playerId] = {
                    id: playerId,
                    name: playerName || 'Player_' + playerId,
                    x: 0,
                    z: 0,
                    rot: 0,
                    lastSeen: Date.now()
                };
                
                console.log(`✅ ${players[playerId].name} подключился`);
                
                return JSON.stringify({
                    success: true,
                    playerId: playerId,
                    players: players,
                    chatHistory: messages.slice(-50)
                });
            },
            
            // Отключить игрока
            disconnect(playerId) {
                if (players[playerId]) {
                    const name = players[playerId].name;
                    delete players[playerId];
                    console.log(`❌ ${name} отключился`);
                    return JSON.stringify({ success: true });
                }
                return JSON.stringify({ error: 'NOT_FOUND' });
            },
            
            // Обновить позицию
            updatePosition(playerId, x, z, rot) {
                if (!serverActive) return JSON.stringify({ error: 'SERVER_STOPPED' });
                if (players[playerId]) {
                    players[playerId].x = x;
                    players[playerId].z = z;
                    players[playerId].rot = rot;
                    players[playerId].lastSeen = Date.now();
                    return JSON.stringify({ success: true });
                }
                return JSON.stringify({ error: 'NOT_FOUND' });
            },
            
            // Отправить сообщение
            sendMessage(playerId, text) {
                if (!serverActive) return JSON.stringify({ error: 'SERVER_STOPPED' });
                if (!players[playerId]) return JSON.stringify({ error: 'NOT_FOUND' });
                
                const msg = {
                    player: players[playerId].name,
                    text: text.substring(0, 200),
                    time: Date.now()
                };
                messages.push(msg);
                if (messages.length > 200) messages.shift();
                
                console.log(`💬 ${msg.player}: ${msg.text}`);
                return JSON.stringify({ success: true, message: msg });
            },
            
            // Получить всех игроков
            getPlayers() {
                return JSON.stringify(players);
            },
            
            // Получить сообщения
            getMessages(since) {
                return JSON.stringify(messages);
            }
        };
        
        // ============ УПРАВЛЕНИЕ ДЛЯ PYTHON ============
        window.ControlAPI = {
            stop(key) {
                if (key !== ENGINE_KEY) return JSON.stringify({ error: 'INVALID_KEY' });
                serverActive = false;
                console.log('🛑 SERVER STOPPED');
                return JSON.stringify({ success: true });
            },
            
            start(key) {
                if (key !== ENGINE_KEY) return JSON.stringify({ error: 'INVALID_KEY' });
                serverActive = true;
                console.log('🟢 SERVER STARTED');
                return JSON.stringify({ success: true });
            },
            
            getStats(key) {
                if (key !== ENGINE_KEY) return JSON.stringify({ error: 'INVALID_KEY' });
                return JSON.stringify({
                    active: serverActive,
                    players: Object.keys(players).length,
                    playersList: players,
                    messagesCount: messages.length
                });
            }
        };
        
        // Очистка неактивных игроков
        setInterval(() => {
            const now = Date.now();
            for (let id in players) {
                if (now - players[id].lastSeen > 30000) {
                    delete players[id];
                }
            }
        }, 10000);
        
        console.log('✅ Сервер готов!');
    </script>
</body>
</html>
