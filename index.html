<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptFlow | API Gateway for JavaScript</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .btn-gradient {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
        }

        .input-modern {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 40px;
            padding: 12px 20px;
            color: white;
            width: 100%;
            outline: none;
            transition: all 0.3s;
        }

        .input-modern:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1, #ec489a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .dropdown {
            position: absolute;
            top: 70px;
            right: 20px;
            background: #1e293b;
            border-radius: 20px;
            padding: 8px 0;
            min-width: 200px;
            z-index: 100;
            border: 1px solid #475569;
            display: none;
        }

        .dropdown a {
            display: block;
            padding: 12px 20px;
            color: #e2e8f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .dropdown a:hover {
            background: #334155;
        }

        .env-panel {
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            width: 380px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            transform: translateX(-100%);
            transition: transform 0.3s;
            z-index: 200;
            padding: 24px;
            border-right: 1px solid #a855f7;
            overflow-y: auto;
        }

        .env-panel.open {
            transform: translateX(0);
        }

        .env-card {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .env-card:hover {
            border-color: #a855f7;
            transform: translateX(5px);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .modal-window {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 32px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            border: 1px solid #a855f7;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 400;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .code-editor {
            background: #0f172a;
            border-radius: 16px;
            padding: 16px;
            font-family: 'Monaco', monospace;
            font-size: 13px;
            border: 1px solid #334155;
            width: 100%;
            color: #e2e8f0;
            resize: vertical;
        }

        .menu-btn {
            position: fixed;
            left: 20px;
            top: 20px;
            font-size: 28px;
            background: rgba(99, 102, 241, 0.3);
            width: 50px;
            height: 50px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 150;
        }

        .key-box {
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            border: 1px solid #a855f7;
        }

        .warning {
            color: #f59e0b;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div id="root"></div>

<script>
    // ========== ХРАНИЛИЩЕ (localStorage) ==========
    const DB = {
        getUsers: () => JSON.parse(localStorage.getItem('scriptflow_users') || '[]'),
        setUsers: (users) => localStorage.setItem('scriptflow_users', JSON.stringify(users)),
        getEnvs: () => JSON.parse(localStorage.getItem('scriptflow_envs') || '[]'),
        setEnvs: (envs) => localStorage.setItem('scriptflow_envs', JSON.stringify(envs)),
        getSessions: () => JSON.parse(localStorage.getItem('scriptflow_sessions') || '[]'),
        setSessions: (sessions) => localStorage.setItem('scriptflow_sessions', JSON.stringify(sessions))
    };

    // Генерация секретного ключа (как у нейросетей)
    function generateSecretKey() {
        const prefixes = ['sk_live', 'sk_test', 'secret_key', 'api_key'];
        const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789';
        let randomStr = '';
        for (let i = 0; i < 32; i++) {
            randomStr += chars[Math.floor(Math.random() * chars.length)];
        }
        const timestamp = Date.now().toString(36).toUpperCase();
        const formatted = randomStr.match(/.{1,8}/g).join('-');
        return `api_${prefix}_${formatted}_${timestamp}`;
    }

    // Генерация ссылки API
    function generateApiLink(key) {
        const baseUrl = window.location.origin + window.location.pathname;
        return `${baseUrl}?run=${key}`;
    }

    // Получить IP (симуляция)
    async function getIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch(e) {
            return '127.0.0.1';
        }
    }

    // Отправить код (симуляция email)
    function sendCode(email, code) {
        console.log(`📧 Код для ${email}: ${code}`);
        alert(`📧 Код подтверждения: ${code}\n(В реальной системе придет на почту ${email})`);
        return true;
    }

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#ef4444' : '#10b981';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ========== АВТОРИЗАЦИЯ ==========
    let currentUser = null;
    let environments = [];

    async function init() {
        // Проверяем, запущен ли скрипт по API ссылке
        const urlParams = new URLSearchParams(window.location.search);
        const runKey = urlParams.get('run');
        
        if (runKey) {
            // Режим выполнения скрипта
            renderScriptRunner(runKey);
            return;
        }
        
        // Обычный режим - проверяем авторизацию
        const token = localStorage.getItem('session_token');
        if (token) {
            const sessions = DB.getSessions();
            const session = sessions.find(s => s.token === token);
            if (session) {
                const users = DB.getUsers();
                currentUser = users.find(u => u.id === session.userId);
                if (currentUser) {
                    loadUserEnvs();
                    renderDashboard();
                    return;
                }
            }
        }
        renderAuth();
    }

    function loadUserEnvs() {
        const allEnvs = DB.getEnvs();
        environments = allEnvs.filter(e => e.userId === currentUser.id);
    }

    function renderAuth() {
        document.getElementById('root').innerHTML = `
            <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
                <div class="glass" style="border-radius: 32px; padding: 40px; max-width: 450px; width: 100%;">
                    <h1 style="font-size: 32px; margin-bottom: 8px; background: linear-gradient(135deg, #6366f1, #ec489a); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ScriptFlow</h1>
                    <p style="margin-bottom: 32px; color: #94a3b8;">API Gateway for JavaScript</p>
                    
                    <div style="display: flex; gap: 12px; margin-bottom: 24px;">
                        <button onclick="switchAuth('login')" id="loginTab" style="flex:1; padding: 10px; border-bottom: 2px solid #a855f7; background: none; color: white; cursor: pointer;">Вход</button>
                        <button onclick="switchAuth('register')" id="registerTab" style="flex:1; padding: 10px; color: #64748b; background: none; cursor: pointer;">Регистрация</button>
                    </div>
                    
                    <div id="authForm"></div>
                </div>
            </div>
        `;
        switchAuth('login');
    }

    window.switchAuth = function(type) {
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const formContainer = document.getElementById('authForm');
        
        if (type === 'login') {
            loginTab.style.borderBottom = '2px solid #a855f7';
            loginTab.style.color = 'white';
            registerTab.style.borderBottom = 'none';
            registerTab.style.color = '#64748b';
            formContainer.innerHTML = `
                <input type="email" id="loginEmail" class="input-modern" placeholder="Email" style="margin-bottom: 16px;">
                <input type="password" id="loginPassword" class="input-modern" placeholder="Пароль" style="margin-bottom: 24px;">
                <button class="btn-gradient" style="width: 100%;" onclick="handleLogin()">Войти</button>
            `;
        } else {
            registerTab.style.borderBottom = '2px solid #a855f7';
            registerTab.style.color = 'white';
            loginTab.style.borderBottom = 'none';
            loginTab.style.color = '#64748b';
            formContainer.innerHTML = `
                <input type="text" id="regUsername" class="input-modern" placeholder="Username" style="margin-bottom: 16px;">
                <input type="email" id="regEmail" class="input-modern" placeholder="Email" style="margin-bottom: 16px;">
                <input type="password" id="regPassword" class="input-modern" placeholder="Пароль" style="margin-bottom: 24px;">
                <button class="btn-gradient" style="width: 100%;" onclick="handleRegister()">Зарегистрироваться</button>
            `;
        }
    };

    window.handleLogin = async function() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        const users = DB.getUsers();
        const user = users.find(u => u.email === email && atob(u.password) === password);
        
        if (!user) {
            showToast('Неверный email или пароль', true);
            return;
        }
        
        if (!user.verified) {
            showToast('Подтвердите email сначала', true);
            return;
        }
        
        // Создаем сессию
        const token = generateSecretKey();
        const sessions = DB.getSessions();
        sessions.push({ token, userId: user.id, ip: await getIP(), createdAt: Date.now() });
        DB.setSessions(sessions);
        localStorage.setItem('session_token', token);
        
        currentUser = user;
        loadUserEnvs();
        renderDashboard();
        showToast('Добро пожаловать!');
    };

    window.handleRegister = async function() {
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        
        if (!username || !email || !password) {
            showToast('Заполните все поля', true);
            return;
        }
        
        const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (!emailRegex.test(email)) {
            showToast('Введите корректный email', true);
            return;
        }
        
        const users = DB.getUsers();
        if (users.find(u => u.email === email)) {
            showToast('Email уже зарегистрирован', true);
            return;
        }
        
        const userIP = await getIP();
        const ipCount = users.filter(u => u.ip === userIP).length;
        if (ipCount >= 2) {
            showToast('С одного IP можно создать не более 2 аккаунтов', true);
            return;
        }
        
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        sendCode(email, code);
        
        const newUser = {
            id: Date.now().toString(),
            username,
            email,
            password: btoa(password),
            ip: userIP,
            verified: false,
            code: code,
            twoFAEnabled: false,
            createdAt: Date.now()
        };
        
        users.push(newUser);
        DB.setUsers(users);
        
        showToast('Код подтверждения отправлен!');
        showCodeModal(email);
    };

    function showCodeModal(email) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-window">
                <h3 style="margin-bottom: 20px;">📧 Подтверждение email</h3>
                <p style="margin-bottom: 16px;">Введите код, отправленный на ${email}</p>
                <input type="text" id="verifyCodeInput" class="input-modern" placeholder="Код из 6 цифр" style="margin-bottom: 20px;">
                <button class="btn-gradient" style="width: 100%;" onclick="verifyCode('${email}')">Подтвердить</button>
                <button onclick="closeModal(this)" style="margin-top: 12px; color: #64748b; cursor: pointer;">Отмена</button>
            </div>
        `;
        document.body.appendChild(modal);
    }

    window.verifyCode = function(email) {
        const codeInput = document.getElementById('verifyCodeInput').value;
        const users = DB.getUsers();
        const user = users.find(u => u.email === email);
        
        if (user && user.code === codeInput) {
            user.verified = true;
            user.code = null;
            DB.setUsers(users);
            closeModal(document.querySelector('.modal'));
            showToast('Email подтвержден! Теперь войдите');
            renderAuth();
        } else {
            showToast('Неверный код', true);
        }
    };

    // ========== ДАШБОРД ==========
    function renderDashboard() {
        document.getElementById('root').innerHTML = `
            <div style="padding: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                    <div class="menu-btn" onclick="toggleEnvPanel()">[:]</div>
                    <h2 style="background: linear-gradient(135deg, #6366f1, #ec489a); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ScriptFlow Dashboard</h2>
                    <div class="avatar" onclick="toggleDropdown()">${currentUser.username[0].toUpperCase()}</div>
                </div>
                
                <div class="dropdown" id="dropdownMenu">
                    <a onclick="logout()">🚪 Logout (Выйти)</a>
                    <a onclick="enable2FA()">🔐 Enable 2FA</a>
                </div>
                
                <div class="env-panel" id="envPanel">
                    <h3 style="margin-bottom: 20px;">📁 Мои окружения</h3>
                    <button class="btn-gradient" style="width: 100%; margin-bottom: 20px;" onclick="showCreateEnv()">+ Создать окружение</button>
                    <div id="envList"></div>
                </div>
                
                <div class="glass" style="border-radius: 32px; padding: 40px; text-align: center; max-width: 800px; margin: 0 auto;">
                    <h3 style="font-size: 24px; margin-bottom: 16px;">🚀 ScriptFlow API</h3>
                    <p style="color: #94a3b8; margin-bottom: 24px;">Создавай окружения, получай API ключи и выполняй JavaScript скрипты</p>
                    <div style="background: #0f172a; border-radius: 16px; padding: 20px;">
                        <p style="font-family: monospace; color: #a855f7;">🔑 Формат ключа: api_sk_live_XXXX-XXXX-XXXX_timestamp</p>
                        <p style="font-size: 12px; color: #64748b; margin-top: 10px;">⚠️ Ключ показывается только один раз!</p>
                    </div>
                </div>
            </div>
        `;
        renderEnvList();
    }

    function renderEnvList() {
        const container = document.getElementById('envList');
        if (!container) return;
        
        if (environments.length === 0) {
            container.innerHTML = '<p style="color: #64748b; text-align: center;">Нет окружений. Создайте первое!</p>';
            return;
        }
        
        container.innerHTML = environments.map(env => `
            <div class="env-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong>${escapeHtml(env.name)}</strong>
                    <button onclick="deleteEnv('${env.id}')" style="color: #ef4444; font-size: 20px; cursor: pointer;">✕</button>
                </div>
                <div style="font-size: 11px; color: #a855f7; margin-top: 8px;">${env.key_preview || 'api_sk_live_****'}</div>
                <button class="btn-gradient" style="margin-top: 12px; padding: 8px 16px; font-size: 12px;" onclick="openEnv('${env.id}')">📦 Открыть окружение</button>
            </div>
        `).join('');
    }

    window.showCreateEnv = function() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-window">
                <h3 style="margin-bottom: 20px;">✨ Создать окружение</h3>
                <input type="text" id="envNameInput" class="input-modern" placeholder="Название окружения (например: Production, Test)" style="margin-bottom: 20px;">
                <button class="btn-gradient" style="width: 100%;" onclick="createEnvironment()">Создать</button>
                <button onclick="closeModal(this)" style="margin-top: 12px; color: #64748b; cursor: pointer;">Отмена</button>
            </div>
        `;
        document.body.appendChild(modal);
    };

    window.createEnvironment = function() {
        const name = document.getElementById('envNameInput').value;
        if (!name) {
            showToast('Введите название', true);
            return;
        }
        
        const secretKey = generateSecretKey();
        const apiLink = generateApiLink(secretKey);
        
        const newEnv = {
            id: Date.now().toString(),
            userId: currentUser.id,
            name: name,
            secretKey: secretKey,
            apiLink: apiLink,
            key_preview: secretKey.substring(0, 20) + '...',
            script: '', // сохраненный скрипт
            createdAt: Date.now()
        };
        
        const allEnvs = DB.getEnvs();
        allEnvs.push(newEnv);
        DB.setEnvs(allEnvs);
        
        loadUserEnvs();
        renderEnvList();
        closeModal(document.querySelector('.modal'));
        
        // Показываем ключ (только один раз!)
        showKeyModal(newEnv);
    };

    function showKeyModal(env) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-window">
                <h3 style="margin-bottom: 16px;">🔐 Окружение создано!</h3>
                <p><strong>Название:</strong> ${escapeHtml(env.name)}</p>
                <p style="margin-top: 16px;"><strong>🔑 Секретный ключ (API Key):</strong></p>
                <div class="key-box">${escapeHtml(env.secretKey)}</div>
                <p class="warning">⚠️ Этот ключ показывается только один раз! Сохраните его.</p>
                <p style="margin-top: 16px;"><strong>🔗 API Ссылка:</strong></p>
                <div class="key-box" style="font-size: 11px;">${escapeHtml(env.apiLink)}</div>
                <button class="btn-gradient" style="width: 100%; margin-top: 20px;" onclick="copyToClipboard('${escapeHtml(env.secretKey)}')">📋 Скопировать ключ</button>
                <button onclick="closeModal(this)" style="margin-top: 12px; color: #64748b; cursor: pointer;">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
    }

    window.openEnv = function(envId) {
        const env = environments.find(e => e.id === envId);
        if (!env) return;
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-window" style="max-width: 700px;">
                <h3 style="margin-bottom: 16px;">📦 ${escapeHtml(env.name)}</h3>
                <p style="margin-bottom: 12px;"><strong>API Ссылка:</strong></p>
                <div class="key-box" style="margin-bottom: 20px;">${escapeHtml(env.apiLink)}</div>
                
                <p style="margin-bottom: 12px;"><strong>📜 JavaScript скрипт (выполнится при переходе по ссылке):</strong></p>
                <textarea id="scriptEditor" class="code-editor" rows="12" placeholder='// Твой JavaScript код
// Пример:
// document.body.style.background = "linear-gradient(135deg, #ff0000, #00ff00)";
// alert("Привет из скрипта!");
// console.log("Скрипт выполнен!");'>${escapeHtml(env.script || '')}</textarea>
                
                <button class="btn-gradient" style="width: 100%; margin-top: 16px;" onclick="saveScript('${env.id}')">💾 Сохранить скрипт</button>
                <button onclick="closeModal(this)" style="margin-top: 12px; color: #64748b; cursor: pointer;">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
    };

    window.saveScript = function(envId) {
        const script = document.getElementById('scriptEditor').value;
        const allEnvs = DB.getEnvs();
        const envIndex = allEnvs.findIndex(e => e.id === envId);
        
        if (envIndex !== -1) {
            allEnvs[envIndex].script = script;
            DB.setEnvs(allEnvs);
            loadUserEnvs();
            showToast('Скрипт сохранен!');
            closeModal(document.querySelector('.modal'));
        }
    };

    window.deleteEnv = function(envId) {
        if (confirm('Удалить окружение? Ключ будет навсегда утерян!')) {
            const allEnvs = DB.getEnvs();
            const filtered = allEnvs.filter(e => e.id !== envId);
            DB.setEnvs(filtered);
            loadUserEnvs();
            renderEnvList();
            showToast('Окружение удалено');
        }
    };

    // ========== ВЫПОЛНЕНИЕ СКРИПТА ПО ССЫЛКЕ ==========
    function renderScriptRunner(key) {
        // Ищем окружение по ключу
        const allEnvs = DB.getEnvs();
        const env = allEnvs.find(e => e.secretKey === key);
        
        document.getElementById('root').innerHTML = `
            <div style="min-height: 100vh; padding: 40px;">
                <div class="glass" style="border-radius: 32px; padding: 40px; max-width: 900px; margin: 0 auto;">
                    <h1 style="margin-bottom: 16px;">🚀 ScriptFlow Runner</h1>
                    <div style="background: #0f172a; border-radius: 16px; padding: 20px; margin-bottom: 24px;">
                        <p><strong>📁 Окружение:</strong> ${env ? escapeHtml(env.name) : 'Не найдено'}</p>
                        <p><strong>🔑 Ключ:</strong> ${escapeHtml(key.substring(0, 30))}...</p>
                    </div>
                    
                    <div id="scriptOutput" class="glass" style="border-radius: 24px; padding: 24px; min-height: 300px;">
                        <p style="color: #64748b;">⏳ Выполнение скрипта...</p>
                    </div>
                    
                    <div style="margin-top: 24px; text-align: center;">
                        <a href="/" style="color: #a855f7;">← Вернуться на главную</a>
                    </div>
                </div>
            </div>
        `;
        
        if (env && env.script) {
            try {
                // Создаем безопасный контекст выполнения
                const outputDiv = document.getElementById('scriptOutput');
                
                // Переопределяем console.log для вывода в div
                const originalLog = console.log;
                console.log = function(...args) {
                    originalLog.apply(console, args);
                    const logLine = document.createElement('div');
                    logLine.style.color = '#10b981';
                    logLine.style.fontFamily = 'monospace';
                    logLine.style.margin = '4px 0';
                    logLine.textContent = '> ' + args.map(a => String(a)).join(' ');
                    outputDiv.appendChild(logLine);
                };
                
                // Выполняем скрипт
                const scriptFunc = new Function(env.script);
                scriptFunc();
                
                console.log = originalLog;
                
                if (outputDiv.children.length === 1) {
                    outputDiv.innerHTML = '<p style="color: #10b981;">✅ Скрипт выполнен! (нет вывода в console.log)</p>';
                }
            } catch(e) {
                document.getElementById('scriptOutput').innerHTML = `
                    <div style="color: #ef4444;">
                        <strong>❌ Ошибка выполнения:</strong><br>
                        <pre style="margin-top: 12px; background: #0f172a; padding: 12px; border-radius: 8px;">${escapeHtml(e.message)}</pre>
                    </div>
                `;
            }
        } else {
            document.getElementById('scriptOutput').innerHTML = `
                <div style="color: #f59e0b;">
                    <p>⚠️ Скрипт не найден или окружение не существует</p>
                    <p style="margin-top: 12px;">Создайте окружение и сохраните скрипт через панель управления</p>
                </div>
            `;
        }
    }

    // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
    window.toggleEnvPanel = function() {
        document.getElementById('envPanel')?.classList.toggle('open');
    };

    window.toggleDropdown = function() {
        const menu = document.getElementById('dropdownMenu');
        if (menu) {
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
    };

    window.logout = function() {
        localStorage.removeItem('session_token');
        showToast('Вы вышли');
        init();
    };

    window.enable2FA = function() {
        showToast('2FA включена! При смене IP будет запрос кода');
    };

    window.copyToClipboard = function(text) {
        navigator.clipboard.writeText(text);
        showToast('Скопировано!');
    };

    window.closeModal = function(btn) {
        btn.closest('.modal')?.remove();
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Закрытие дропдауна
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.avatar') && !e.target.closest('.dropdown')) {
            const menu = document.getElementById('dropdownMenu');
            if (menu) menu.style.display = 'none';
        }
    });

    // Запуск
    init();
</script>
</body>
</html>
