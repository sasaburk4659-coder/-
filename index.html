<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Server Engine</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .status {
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
        }
        .online {
            color: #4caf50;
            font-weight: bold;
        }
        .offline {
            color: #f44336;
            font-weight: bold;
        }
        .connections {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        .connection-item {
            background: rgba(255, 255, 255, 0.1);
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
        }
        .messages {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            height: 300px;
            overflow-y: auto;
        }
        .message {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .timestamp {
            color: #888;
            font-size: 0.8em;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
        }
        button {
            background: #4caf50;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        .broadcast-area {
            margin-top: 20px;
            text-align: center;
        }
        .broadcast-area input {
            width: 70%;
            background: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 WebSocket Server Engine</h1>
        
        <div class="status">
            <h3>Server Status: <span id="serverStatus" class="offline">OFFLINE</span></h3>
            <p>Server URL: <strong id="serverUrl"></strong></p>
            <button onclick="startServer()">▶ Start Server</button>
            <button onclick="stopServer()">⏹ Stop Server</button>
        </div>

        <div class="connections">
            <h3>📡 Active Connections: <span id="connectionCount">0</span></h3>
            <div id="connectionsList"></div>
        </div>

        <div class="broadcast-area">
            <h3>📢 Broadcast Message to All Clients</h3>
            <input type="text" id="broadcastMessage" placeholder="Enter message to broadcast...">
            <button onclick="broadcastMessage()">Send Broadcast</button>
        </div>

        <div class="messages">
            <h3>📝 Server Log</h3>
            <div id="messages"></div>
        </div>
    </div>

    <script>
        let server = null;
        let clients = new Map();
        let clientId = 0;

        function addMessage(text, type = 'info') {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            const timestamp = new Date().toLocaleTimeString();
            messageDiv.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${text}`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateConnectionCount() {
            document.getElementById('connectionCount').textContent = clients.size;
            const connectionsList = document.getElementById('connectionsList');
            connectionsList.innerHTML = '';
            clients.forEach((client, id) => {
                const connDiv = document.createElement('div');
                connDiv.className = 'connection-item';
                connDiv.innerHTML = `Client ${id} - ${client.url || 'Unknown'}`;
                connectionsList.appendChild(connDiv);
            });
        }

        function startServer() {
            if (server) {
                addMessage('Server is already running!', 'error');
                return;
            }

            try {
                server = new WebSocketServer();
                server.on('connection', (client) => {
                    const id = ++clientId;
                    clients.set(id, client);
                    addMessage(`✅ New client connected! ID: ${id}`, 'success');
                    updateConnectionCount();
                    
                    client.on('message', (data) => {
                        addMessage(`📨 Message from Client ${id}: ${data}`, 'message');
                        // Echo back to client
                        client.send(`Server received: ${data}`);
                    });
                    
                    client.on('close', () => {
                        clients.delete(id);
                        addMessage(`❌ Client ${id} disconnected`, 'error');
                        updateConnectionCount();
                    });
                    
                    client.send(`Welcome! You are client #${id}`);
                });
                
                document.getElementById('serverStatus').className = 'online';
                document.getElementById('serverStatus').textContent = 'ONLINE';
                document.getElementById('serverUrl').textContent = window.location.href;
                addMessage('🚀 Server started successfully!', 'success');
            } catch (error) {
                addMessage(`Failed to start server: ${error.message}`, 'error');
            }
        }

        function stopServer() {
            if (server) {
                // Close all client connections
                clients.forEach((client, id) => {
                    try {
                        client.close();
                    } catch(e) {}
                });
                clients.clear();
                server.close();
                server = null;
                document.getElementById('serverStatus').className = 'offline';
                document.getElementById('serverStatus').textContent = 'OFFLINE';
                addMessage('🛑 Server stopped', 'error');
                updateConnectionCount();
            }
        }

        function broadcastMessage() {
            const message = document.getElementById('broadcastMessage').value;
            if (!message) {
                addMessage('Please enter a message to broadcast', 'error');
                return;
            }
            
            if (clients.size === 0) {
                addMessage('No clients connected to broadcast to', 'error');
                return;
            }
            
            clients.forEach((client, id) => {
                try {
                    client.send(`📢 BROADCAST: ${message}`);
                } catch(e) {
                    addMessage(`Failed to send to client ${id}: ${e.message}`, 'error');
                }
            });
            addMessage(`📢 Broadcasted to ${clients.size} clients: "${message}"`, 'success');
            document.getElementById('broadcastMessage').value = '';
        }

        // Simple WebSocket Server implementation using browser's WebSocket (for demo purposes)
        // Note: This is a simplified version. In production, you'd need a real WebSocket server
        class WebSocketServer {
            constructor() {
                this.clients = new Set();
                this.eventHandlers = {};
                
                // Create a WebSocket server using a shared worker or service worker
                // For demo, we'll create a WebSocket that listens for connections
                try {
                    this.ws = new WebSocket('wss://echo.websocket.org'); // Placeholder
                    this.setupMockServer();
                } catch(e) {
                    console.error('WebSocket server requires a real server implementation');
                }
            }
            
            setupMockServer() {
                // Mock server for demo purposes
                addMessage('⚠️ Note: This is a demo server. For real WebSocket server, use Node.js or Python WebSocket server.', 'error');
            }
            
            on(event, callback) {
                this.eventHandlers[event] = callback;
            }
            
            close() {
                if (this.ws) {
                    this.ws.close();
                }
            }
        }

        // Display server info
        document.getElementById('serverUrl').textContent = window.location.href;
        addMessage('Server engine loaded. Click "Start Server" to begin accepting connections', 'info');
    </script>
</body>
</html>
