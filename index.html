<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mini App Controller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .status {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 14px;
            color: #666;
        }

        .status.active {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.inactive {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin: 10px;
            font-weight: 600;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        button.remove {
            background: #dc3545;
        }

        button.remove:hover {
            background: #c82333;
        }

        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Mini App Manager</h1>
        
        <div id="status" class="status">
            Загрузка статуса...
        </div>
        
        <div>
            <button id="removeBtn" class="remove">🗑️ Убрать мини-приложение</button>
        </div>
        
        <div class="info">
            <p>⚠️ Нажмите кнопку выше, чтобы скрыть приложение</p>
            <p>🔄 Для возврата используйте команду /start в боте</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://YOUR_PYTHON_SERVER.com/api'; // Замените на адрес вашего Python сервера
        
        async function getStatus() {
            try {
                const response = await fetch(`${API_URL}/status`);
                const data = await response.json();
                const statusDiv = document.getElementById('status');
                
                if (data.active) {
                    statusDiv.textContent = '✅ Приложение активно и доступно';
                    statusDiv.className = 'status active';
                } else {
                    statusDiv.textContent = '❌ Приложение скрыто. Используйте /start в боте для возврата';
                    statusDiv.className = 'status inactive';
                }
            } catch (error) {
                console.error('Ошибка получения статуса:', error);
                document.getElementById('status').textContent = '⚠️ Не удалось подключиться к серверу';
            }
        }
        
        async function removeApp() {
            const btn = document.getElementById('removeBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Отправка... <span class="loading"></span>';
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/remove`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Приложение успешно скрыто! Используйте /start в боте для возврата.');
                    await getStatus();
                } else {
                    alert('❌ Ошибка: ' + (data.error || 'Неизвестная ошибка'));
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка подключения к серверу');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        
        document.getElementById('removeBtn').addEventListener('click', removeApp);
        
        // Проверяем статус при загрузке и каждые 5 секунд
        getStatus();
        setInterval(getStatus, 5000);
    </script>
</body>
</html>
