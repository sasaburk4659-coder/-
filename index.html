<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Engine Server</title>
</head>
<body>
    <script>
        // ============ ИГРОВОЙ ДВИЖОК - СЕРВЕР ============
        
        let serverActive = true;
        let players = new Map();
        let messages = [];
        let connectedGames = new Set();
        
        const ENGINE_KEY = "AI_ENGINE_7x9k2m4n8p1q_SECURE_2024";
        let eventListeners = new Map();
        const SESSION_ID = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        
        console.log('═══════════════════════════════════════════════════');
        console.log('🎮 GAME ENGINE SERVER v3.0');
        console.log(`🔑 KEY: ${ENGINE_KEY}`);
        console.log(`📡 STATUS: ${serverActive ? '🟢 ONLINE' : '🔴 OFFLINE'}`);
        console.log('═══════════════════════════════════════════════════');
        
        window.GameEngine = {
            ping() {
                return { status: serverActive ? 'online' : 'offline', session: SESSION_ID, timestamp: Date.now() };
            },
            
            getStatus() {
                return { active: serverActive, players: players.size, session: SESSION_ID };
            },
            
            connect(playerData) {
                console.log('📡 Подключение:', playerData);
                
                if (!serverActive) {
                    return { success: false, error: 'SERVER_STOPPED', message: 'Сервер остановлен' };
                }
                
                const playerId = playerData.id || ('p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6));
                
                const player = {
                    id: playerId,
                    name: playerData.name.substring(0, 20),
                    position: playerData.position || { x: 0, y: 0, z: 0 },
                    rotation: playerData.rotation || { y: 0 },
                    color: playerData.color || this.getRandomColor(),
                    connectedAt: Date.now(),
                    lastUpdate: Date.now()
                };
                
                players.set(playerId, player);
                this.broadcast('player_joined', player);
                
                console.log(`✅ Игрок: ${player.name} | Всего: ${players.size}`);
                
                return {
                    success: true,
                    playerId: playerId,
                    players: this.getAllPlayers(),
                    chatHistory: messages.slice(-100),
                    serverStatus: serverActive
                };
            },
            
            disconnect(playerId) {
                if (players.has(playerId)) {
                    const player = players.get(playerId);
                    players.delete(playerId);
                    this.broadcast('player_left', player);
                    return { success: true };
                }
                return { success: false };
            },
            
            updatePosition(playerId, position, rotation, animationState) {
                if (!serverActive) return { error: 'SERVER_STOPPED' };
                if (players.has(playerId)) {
                    const player = players.get(playerId);
                    player.position = position;
                    if (rotation) player.rotation = rotation;
                    if (animationState) player.animationState = animationState;
                    player.lastUpdate = Date.now();
                    
                    this.broadcast('position_update', {
                        playerId, position, rotation, animationState,
                        playerName: player.name
                    });
                    return { success: true };
                }
                return { error: 'PLAYER_NOT_FOUND' };
            },
            
            sendMessage(playerId, text) {
                if (!serverActive) return { error: 'SERVER_STOPPED' };
                if (!players.has(playerId)) return { error: 'PLAYER_NOT_FOUND' };
                
                const player = players.get(playerId);
                const message = {
                    id: Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                    playerId, playerName: player.name, text: text.trim().substring(0, 200),
                    timestamp: Date.now(), color: player.color
                };
                
                messages.push(message);
                if (messages.length > 500) messages.shift();
                this.broadcast('new_message', message);
                return { success: true };
            },
            
            getAllPlayers() {
                return Array.from(players.values());
            },
            
            getChatHistory(limit = 100) {
                return messages.slice(-limit);
            },
            
            getRandomColor() {
                const colors = ['#4CAF50', '#2196F3', '#FF9800', '#E91E63', '#9C27B0', '#00BCD4'];
                return colors[Math.floor(Math.random() * colors.length)];
            },
            
            broadcast(event, data) {
                if (eventListeners.has(event)) {
                    eventListeners.get(event).forEach(cb => { try { cb(data); } catch(e) {} });
                }
            },
            
            on(event, callback) {
                if (!eventListeners.has(event)) eventListeners.set(event, []);
                eventListeners.get(event).push(callback);
                return () => {
                    const list = eventListeners.get(event);
                    if (list) { const i = list.indexOf(callback); if (i > -1) list.splice(i, 1); }
                };
            },
            
            registerGame(gameId) {
                connectedGames.add(gameId);
                return { success: true };
            }
        };
        
        window.ServerControl = {
            stop(key) {
                if (key !== ENGINE_KEY) return { success: false };
                serverActive = false;
                window.GameEngine.broadcast('server_stopped', { message: 'Сервер остановлен' });
                return { success: true };
            },
            start(key) {
                if (key !== ENGINE_KEY) return { success: false };
                serverActive = true;
                window.GameEngine.broadcast('server_started', { message: 'Сервер запущен' });
                return { success: true };
            },
            getStats(key) {
                if (key !== ENGINE_KEY) return { success: false };
                return {
                    success: true, active: serverActive, playersCount: players.size,
                    players: Array.from(players.values()),
                    messagesCount: messages.length
                };
            }
        };
        
        setInterval(() => {
            if (!serverActive) return;
            const now = Date.now();
            for (const [id, player] of players) {
                if (now - player.lastUpdate > 60000) {
                    players.delete(id);
                    window.GameEngine.broadcast('player_left', player);
                }
            }
        }, 30000);
        
        console.log('✅ Движок готов');
    </script>
</body>
</html>
