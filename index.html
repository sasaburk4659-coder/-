<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Engine API</title>
</head>
<body>
    <script>
        // ============ ИГРОВОЙ ДВИЖОК - СЕРВЕРНАЯ ЧАСТЬ ============
        // Не содержит UI, только API для подключения игр
        
        // Состояние сервера
        let serverActive = true;
        let players = {};
        let messages = [];
        let connectedGames = new Set();
        
        // Секретный ключ для управления (как у нейросети)
        const ENGINE_KEY = "AI_ENGINE_7x9k2m4n8p1q_2024_SECURE_KEY";
        
        // Хранилище событий
        let eventListeners = {};
        
        // ============ API ДЛЯ ИГР ============
        window.GameEngine = {
            // Получить статус сервера
            getStatus() {
                return { 
                    active: serverActive, 
                    players: Object.keys(players).length,
                    timestamp: Date.now()
                };
            },
            
            // Подключить игрока
            connect(playerData) {
                if (!serverActive) return { error: 'SERVER_STOPPED', message: 'Сервер остановлен' };
                
                const playerId = playerData.id || ('player_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6));
                const player = {
                    id: playerId,
                    name: playerData.name || 'Игрок',
                    position: playerData.position || { x: 0, y: 0, z: 0 },
                    rotation: playerData.rotation || { y: 0 },
                    connectedAt: Date.now(),
                    lastUpdate: Date.now()
                };
                
                players[playerId] = player;
                
                // Отправляем всем подключенным играм о новом игроке
                this.broadcast('player_joined', player);
                
                console.log(`✅ Игрок подключен: ${player.name} (${playerId})`);
                
                return {
                    success: true,
                    playerId: playerId,
                    players: this.getAllPlayers(),
                    chatHistory: messages.slice(-50)
                };
            },
            
            // Отключить игрока
            disconnect(playerId) {
                if (players[playerId]) {
                    const player = players[playerId];
                    delete players[playerId];
                    this.broadcast('player_left', player);
                    console.log(`❌ Игрок отключен: ${player.name}`);
                    return { success: true };
                }
                return { error: 'PLAYER_NOT_FOUND' };
            },
            
            // Обновить позицию игрока
            updatePosition(playerId, position, rotation) {
                if (!serverActive) return { error: 'SERVER_STOPPED' };
                
                if (players[playerId]) {
                    players[playerId].position = position;
                    if (rotation) players[playerId].rotation = rotation;
                    players[playerId].lastUpdate = Date.now();
                    
                    this.broadcast('position_update', {
                        playerId: playerId,
                        position: position,
                        rotation: rotation
                    });
                    
                    return { success: true };
                }
                return { error: 'PLAYER_NOT_FOUND' };
            },
            
            // Отправить сообщение в чат
            sendMessage(playerId, text) {
                if (!serverActive) return { error: 'SERVER_STOPPED' };
                
                const player = players[playerId];
                if (player && text && text.trim()) {
                    const message = {
                        id: Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                        playerId: playerId,
                        playerName: player.name,
                        text: text.trim().substring(0, 200),
                        timestamp: Date.now()
                    };
                    
                    messages.push(message);
                    
                    // Храним только последние 500 сообщений
                    if (messages.length > 500) messages = messages.shift();
                    
                    this.broadcast('new_message', message);
                    console.log(`💬 ${player.name}: ${message.text}`);
                    
                    return { success: true, message: message };
                }
                return { error: 'INVALID_MESSAGE' };
            },
            
            // Получить всех игроков
            getAllPlayers() {
                return Object.values(players);
            },
            
            // Получить историю чата
            getChatHistory(limit = 100) {
                return messages.slice(-limit);
            },
            
            // Получить конкретного игрока
            getPlayer(playerId) {
                return players[playerId] || null;
            },
            
            // Проверка жив ли игрок
            isPlayerOnline(playerId) {
                return !!players[playerId];
            },
            
            // Broadcast события
            broadcast(event, data) {
                if (eventListeners[event]) {
                    eventListeners[event].forEach(callback => {
                        try {
                            callback(data);
                        } catch(e) {
                            console.error('Ошибка в обработчике события:', e);
                        }
                    });
                }
            },
            
            // Подписка на события
            on(event, callback) {
                if (!eventListeners[event]) eventListeners[event] = [];
                eventListeners[event].push(callback);
                return () => {
                    const index = eventListeners[event].indexOf(callback);
                    if (index > -1) eventListeners[event].splice(index, 1);
                };
            },
            
            // Регистрация игры (для отслеживания подключений)
            registerGame(gameId) {
                connectedGames.add(gameId);
                return { success: true, gameId: gameId };
            },
            
            // Отмена регистрации игры
            unregisterGame(gameId) {
                connectedGames.delete(gameId);
            }
        };
        
        // ============ API ДЛЯ PYTHON СКРИПТА (УПРАВЛЕНИЕ) ============
        window.ServerControl = {
            // Остановить сервер
            stop(key) {
                if (key !== ENGINE_KEY) return { error: 'INVALID_KEY', message: 'Неверный ключ доступа' };
                
                if (!serverActive) return { error: 'ALREADY_STOPPED', message: 'Сервер уже остановлен' };
                
                serverActive = false;
                
                // Оповещаем все подключенные игры
                window.GameEngine.broadcast('server_stopped', {
                    message: 'Сервер остановлен администратором',
                    timestamp: Date.now()
                });
                
                console.log('🛑 СЕРВЕР ОСТАНОВЛЕН');
                
                return {
                    success: true,
                    message: 'Сервер успешно остановлен',
                    timestamp: Date.now()
                };
            },
            
            // Запустить сервер
            start(key) {
                if (key !== ENGINE_KEY) return { error: 'INVALID_KEY', message: 'Неверный ключ доступа' };
                
                if (serverActive) return { error: 'ALREADY_RUNNING', message: 'Сервер уже запущен' };
                
                serverActive = true;
                
                // Оповещаем все подключенные игры
                window.GameEngine.broadcast('server_started', {
                    message: 'Сервер запущен',
                    timestamp: Date.now()
                });
                
                console.log('🟢 СЕРВЕР ЗАПУЩЕН');
                
                return {
                    success: true,
                    message: 'Сервер успешно запущен',
                    timestamp: Date.now()
                };
            },
            
            // Получить полную статистику
            getStats(key) {
                if (key !== ENGINE_KEY) return { error: 'INVALID_KEY' };
                
                return {
                    active: serverActive,
                    playersCount: Object.keys(players).length,
                    players: Object.values(players).map(p => ({
                        id: p.id,
                        name: p.name,
                        position: p.position,
                        lastUpdate: p.lastUpdate
                    })),
                    messagesCount: messages.length,
                    messages: messages.slice(-20),
                    connectedGames: Array.from(connectedGames),
                    uptime: Date.now() - (window._startTime || Date.now()),
                    timestamp: Date.now()
                };
            },
            
            // Очистить историю чата
            clearChat(key) {
                if (key !== ENGINE_KEY) return { error: 'INVALID_KEY' };
                
                messages = [];
                window.GameEngine.broadcast('chat_cleared', { message: 'История чата очищена' });
                
                return { success: true, message: 'Чат очищен' };
            },
            
            // Кикнуть игрока
            kickPlayer(key, playerId, reason = '') {
                if (key !== ENGINE_KEY) return { error: 'INVALID_KEY' };
                
                if (players[playerId]) {
                    const player = players[playerId];
                    delete players[playerId];
                    
                    window.GameEngine.broadcast('player_kicked', {
                        playerId: playerId,
                        playerName: player.name,
                        reason: reason
                    });
                    
                    return { success: true, message: `Игрок ${player.name} кикнут` };
                }
                
                return { error: 'PLAYER_NOT_FOUND' };
            }
        };
        
        // Автоматическая очистка неактивных игроков (каждые 30 секунд)
        setInterval(() => {
            if (!serverActive) return;
            
            const now = Date.now();
            const inactiveTimeout = 60000; // 1 минута бездействия
            
            Object.keys(players).forEach(playerId => {
                const player = players[playerId];
                if (now - player.lastUpdate > inactiveTimeout) {
                    console.log(`⏰ Игрок ${player.name} отключен по таймауту`);
                    delete players[playerId];
                    window.GameEngine.broadcast('player_left', player);
                }
            });
        }, 30000);
        
        // Сохраняем время запуска
        window._startTime = Date.now();
        
        // Экспортируем ключ для Python скрипта (доступен через window)
        window.ENGINE_KEY = ENGINE_KEY;
        
        console.log('═══════════════════════════════════════');
        console.log('🎮 GAME ENGINE SERVER v2.0');
        console.log('═══════════════════════════════════════');
        console.log(`🔑 КЛЮЧ УПРАВЛЕНИЯ: ${ENGINE_KEY}`);
        console.log(`📡 СТАТУС: ${serverActive ? '🟢 РАБОТАЕТ' : '🔴 ОСТАНОВЛЕН'}`);
        console.log(`🌐 URL: ${window.location.href}`);
        console.log('═══════════════════════════════════════');
        console.log('✅ API готов к подключению игр');
        console.log('💡 Для управления используйте ServerControl API');
        console.log('═══════════════════════════════════════');
    </script>
</body>
</html>
