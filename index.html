<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TERRA ENGINE</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; }
    </style>
</head>
<body>
<script>
    // ========== ТЕРРАРИУМ ДВИЖОК v2.0 ==========
    // Полностью скрытый API-сервер
    
    let engineRunning = true;
    let masterKey = "TERRA_ENGINE_MASTER_2024";
    let players = new Map();
    let totalConnections = 0;
    let syncCount = 0;
    
    function saveToStorage() {
        localStorage.setItem('terra_engine_running', engineRunning);
        localStorage.setItem('terra_players', JSON.stringify(Array.from(players.values())));
        localStorage.setItem('terra_total_connections', totalConnections);
        localStorage.setItem('terra_sync_count', syncCount);
        localStorage.setItem('terra_last_update', Date.now());
    }
    
    function loadFromStorage() {
        const savedEngine = localStorage.getItem('terra_engine_running');
        if (savedEngine !== null) engineRunning = savedEngine === 'true';
        
        const savedPlayers = localStorage.getItem('terra_players');
        if (savedPlayers) {
            const parsed = JSON.parse(savedPlayers);
            players.clear();
            parsed.forEach(p => players.set(p.id, p));
        }
        
        const savedTotal = localStorage.getItem('terra_total_connections');
        if (savedTotal) totalConnections = parseInt(savedTotal);
        
        const savedSync = localStorage.getItem('terra_sync_count');
        if (savedSync) syncCount = parseInt(savedSync);
    }
    
    // ========== API ДЛЯ ИГРОВОГО КЛИЕНТА ==========
    window.TerraEngine = {
        getStatus: () => {
            return { running: engineRunning, playersOnline: players.size };
        },
        
        join: (playerName) => {
            if (!engineRunning) {
                return { success: false, error: "engine_stopped" };
            }
            const sessionId = "p_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
            const newPlayer = {
                id: sessionId, name: playerName,
                x: 450, y: 300, gold: 500, ore: 40, seeds: 35, crystals: 12,
                joinedAt: Date.now()
            };
            players.set(sessionId, newPlayer);
            totalConnections++;
            saveToStorage();
            return { success: true, sessionId: sessionId, playerData: newPlayer };
        },
        
        sync: (sessionId, playerData) => {
            if (!players.has(sessionId)) return { error: "player_not_found" };
            const player = players.get(sessionId);
            Object.assign(player, playerData);
            players.set(sessionId, player);
            syncCount++;
            saveToStorage();
            return { success: true, playerData: player };
        },
        
        move: (sessionId, x, y) => {
            if (!players.has(sessionId)) return { error: "player_not_found" };
            const player = players.get(sessionId);
            player.x = x;
            player.y = y;
            saveToStorage();
            return { success: true };
        },
        
        getPlayers: () => {
            return Array.from(players.values()).map(p => ({
                id: p.id, name: p.name, x: p.x, y: p.y,
                gold: p.gold, ore: p.ore, seeds: p.seeds
            }));
        },
        
        leave: (sessionId) => {
            if (players.has(sessionId)) {
                players.delete(sessionId);
                saveToStorage();
            }
            return { success: true };
        },
        
        // ========== УПРАВЛЕНИЕ ДВИЖКОМ (только для Python скрипта) ==========
        control: (action, key) => {
            if (key !== masterKey) return { success: false, error: "invalid_key" };
            if (action === 'start') {
                engineRunning = true;
                saveToStorage();
                return { success: true, running: true };
            }
            if (action === 'stop') {
                engineRunning = false;
                saveToStorage();
                return { success: true, running: false };
            }
            return { success: false, error: "unknown_action" };
        }
    };
    
    loadFromStorage();
    console.log("TERRA ENGINE READY");
</script>
</body>
</html>
