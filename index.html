<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Хранители Кристалла - Многопользовательская 3D Игра</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ffaa44;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        
        h1 {
            color: #ffaa44;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            background: rgba(30,30,40,0.9);
            border: 1px solid #ffaa44;
            color: white;
            border-radius: 10px;
            font-size: 16px;
        }
        
        button {
            background: #ffaa44;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: 0.3s;
        }
        
        button:hover {
            transform: scale(1.02);
            background: #ffcc66;
        }
        
        .server-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            font-size: 12px;
            color: #88ff88;
        }
        
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
        }
        
        .status.online {
            background: rgba(0,255,0,0.2);
            color: #0f0;
        }
        
        .status.offline {
            background: rgba(255,0,0,0.2);
            color: #f00;
        }
        
        .players-online {
            margin-top: 15px;
            font-size: 14px;
            color: #ffaa44;
        }
        
        a {
            color: #ffaa44;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Хранители Кристалла</h1>
        <div class="subtitle">Многопользовательское 3D приключение</div>
        
        <input type="text" id="server-address" placeholder="ws://localhost:8765" value="ws://localhost:8765">
        <input type="text" id="player-name" placeholder="Ваш никнейм" maxlength="20">
        <button id="connect-btn">🔌 Подключиться к игре</button>
        
        <div class="server-info" id="server-info">
            🔍 Поиск серверов...
        </div>
        
        <div id="status" class="status offline">⚫ Не подключено</div>
        <div id="players-online" class="players-online">👥 Игроков онлайн: 0</div>
        
        <div style="margin-top: 20px; font-size: 11px; color: #666;">
            💡 Запустите server.py на вашем ПК, затем введите его адрес
        </div>
    </div>
    
    <script>
        // Автоматический поиск сервера
        async function findServer() {
            const serverInfo = document.getElementById('server-info');
            const localIp = window.location.hostname;
            
            // Пробуем разные порты
            const ports = [5000, 8080, 3000];
            
            for (const port of ports) {
                try {
                    const response = await fetch(`http://${localIp}:${port}/api/server-info`, {
                        timeout: 2000
                    });
                    if (response.ok) {
                        const data = await response.json();
                        serverInfo.innerHTML = `
                            ✅ Найден сервер!<br>
                            📡 Адрес: ${data.ws_url}<br>
                            👥 Игроков: ${data.players_count}/${data.max_players}<br>
                            🎮 Статус: ${data.status}
                        `;
                        document.getElementById('server-address').value = data.ws_url;
                        document.getElementById('players-online').innerHTML = `👥 Игроков онлайн: ${data.players_count}`;
                        return;
                    }
                } catch(e) {
                    // Пропускаем
                }
            }
            
            serverInfo.innerHTML = `
                ❌ Сервер не найден<br>
                💡 Запустите server.py на вашем компьютере<br>
                📡 Адрес сервера: ws://${localIp}:8765
            `;
        }
        
        // Подключение к игре
        document.getElementById('connect-btn').addEventListener('click', () => {
            const serverUrl = document.getElementById('server-address').value;
            const playerName = document.getElementById('player-name').value.trim() || `Гость_${Math.floor(Math.random() * 1000)}`;
            
            // Сохраняем данные в localStorage для игры
            localStorage.setItem('serverUrl', serverUrl);
            localStorage.setItem('playerName', playerName);
            
            // Перенаправляем на страницу игры
            window.location.href = 'game.html';
        });
        
        // Запускаем поиск сервера
        findServer();
        
        // Обновляем каждые 5 секунд
        setInterval(findServer, 5000);
    </script>
</body>
</html>
